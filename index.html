<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>매점 빵 사오기!</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #222;
    font-family: -apple-system, "Malgun Gothic", "맑은 고딕", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas {
    display: block;
    background: #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    max-width: 100%;
    max-height: 100%;
  }
  #controls { display: none; position: fixed; bottom: 0; left: 0; right: 0; pointer-events: none; z-index: 10; }
  #controls.show { display: block; }
  .dpad { position: absolute; bottom: 20px; left: 20px; width: 180px; height: 180px; pointer-events: auto; }
  .dpad button {
    position: absolute; width: 60px; height: 60px;
    border: none; border-radius: 12px;
    background: rgba(50,50,60,0.7);
    color: white; font-size: 28px; font-weight: bold;
    user-select: none; -webkit-user-select: none;
  }
  .dpad button:active, .dpad button.pressed {
    background: rgba(80,130,220,0.9); transform: scale(0.95);
  }
  .dpad .up    { top: 0;     left: 60px; }
  .dpad .down  { top: 120px; left: 60px; }
  .dpad .left  { top: 60px;  left: 0; }
  .dpad .right { top: 60px;  left: 120px; }
  .actions { position: absolute; bottom: 40px; right: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .actions button {
    width: 80px; height: 80px; border: none; border-radius: 50%;
    background: rgba(220,70,70,0.85); color: white;
    font-size: 14px; font-weight: bold;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  .actions button:active { transform: scale(0.95); background: rgba(180,50,50,0.95); }
  .actions .restart { width: 60px; height: 60px; background: rgba(80,80,90,0.85); font-size: 12px; }
  #start-hint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); color: white;
    padding: 30px 40px; border-radius: 12px;
    text-align: center; z-index: 100;
    font-size: 18px; line-height: 1.6;
  }
  #start-hint h2 { margin-bottom: 16px; font-size: 24px; }
  #start-hint button {
    margin-top: 20px; padding: 12px 30px; font-size: 18px;
    border: none; border-radius: 8px;
    background: #4080dc; color: white; font-weight: bold;
  }
  #start-hint button:active { background: #3060b0; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas" width="900" height="600"></canvas>
  <div id="controls">
    <div class="dpad">
      <button class="up"    data-key="ArrowUp">▲</button>
      <button class="down"  data-key="ArrowDown">▼</button>
      <button class="left"  data-key="ArrowLeft">◀</button>
      <button class="right" data-key="ArrowRight">▶</button>
    </div>
    <div class="actions">
      <button class="action" data-key=" ">빵사기</button>
      <button class="restart" data-key="r">재시작</button>
    </div>
  </div>
  <div id="start-hint">
    <h2>🥖 매점 빵 사오기!</h2>
    <div>제한 시간 50초 안에<br>매점에서 빵 사서 교실로!</div>
    <div style="margin-top: 12px; font-size: 14px; opacity: 0.8;">
      교실 → 복도 → 계단 → 매점<br>→ 계단 → 복도 → 교실
    </div>
    <div style="margin-top: 12px; font-size: 14px; opacity: 0.8;">
      📱 모바일: 화면 버튼<br>
      💻 PC: 방향키 + 스페이스바
    </div>
    <button id="start-btn">게임 시작</button>
  </div>
</div>

<script>
"use strict";

// ===========================================================
// 매점 빵 사오기 (Bread Run!) - HTML5 Canvas
// ===========================================================

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const W = 900, H = 600;

// 색깔
const C = {
  WHITE: "#ffffff", BLACK: "#000000",
  GRAY: "#b4b4b4", LIGHT_GRAY: "#dcdcdc", DARK_GRAY: "#5a5a64",
  RED: "#dc4646", DARK_RED: "#a02828",
  BLUE: "#4682dc", DARK_BLUE: "#2850a0",
  GREEN: "#5ab46e", YELLOW: "#fad250", ORANGE: "#f5963c",
  BROWN: "#a06e3c", DARK_BROWN: "#6e4628",
  PINK: "#ffc8d7", SKIN: "#ffdcb4", WOOD: "#c89664",
  WALL_BEIGE: "#f0e1c3", SKY_BLUE: "#aad7f0",
};

// 플레이 영역
const PLAY_AREA = { x: 60, y: 380, w: W - 120, h: 180 };
const STAIRS_AREA = { x: 280, y: 80, w: W - 560, h: H - 130 };
[PLAY_AREA, STAIRS_AREA].forEach(r => {
  r.right = r.x + r.w; r.bottom = r.y + r.h;
  r.cx = r.x + r.w/2; r.cy = r.y + r.h/2;
});

function getPlayArea(idx) {
  return (idx === 2 || idx === 4) ? STAIRS_AREA : PLAY_AREA;
}

// ============ 그리기 헬퍼 ============
function rect(x, y, w, h, fill, stroke, lw) {
  if (fill)   { ctx.fillStyle = fill; ctx.fillRect(x, y, w, h); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.strokeRect(x, y, w, h); }
}
function circle(x, y, r, fill, stroke, lw) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}
function ellipse(x, y, w, h, fill, stroke, lw) {
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}
function line(x1, y1, x2, y2, color, w) {
  ctx.strokeStyle = color; ctx.lineWidth = w || 1;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}
function gradient(x, y, w, h, top, bottom) {
  const g = ctx.createLinearGradient(x, y, x, y + h);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g; ctx.fillRect(x, y, w, h);
}
function shadow(x, y, w, h) {
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
  ctx.fill();
}
function roundRect(x, y, w, h, r, fill, stroke, lw) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 2; ctx.stroke(); }
}
function drawText(text, x, y, size, color, bold) {
  ctx.font = `${bold ? "bold " : ""}${size}px -apple-system, "Malgun Gothic", sans-serif`;
  ctx.fillStyle = color || C.BLACK;
  ctx.fillText(text, x, y);
}

// ============ 스테이지 배경 ============
function drawClassroom() {
  gradient(0, 0, W, PLAY_AREA.y, C.WALL_BEIGE, "#d2c3a5");
  rect(0, PLAY_AREA.y, W, H - PLAY_AREA.y, C.WOOD);
  for (let i = 0; i < W; i += 60) line(i, PLAY_AREA.y, i, H, C.DARK_BROWN, 1);
  rect(120, 60, 360, 180, "#285032");
  rect(120, 60, 360, 180, null, C.DARK_BROWN, 6);
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  drawText("매점 다녀오겠습니다!", 140, 90, 18, C.WHITE);
  rect(200, 280, 200, 80, C.DARK_BROWN);
  rect(210, 290, 180, 60, C.BROWN);
  for (const dx of [560, 720]) {
    rect(dx, 290, 110, 70, C.WOOD);
    rect(dx, 290, 110, 70, null, C.DARK_BROWN, 2);
    rect(dx + 5, 360, 8, 30, C.DARK_BROWN);
    rect(dx + 97, 360, 8, 30, C.DARK_BROWN);
  }
  rect(560, 80, 240, 140, C.SKY_BLUE);
  rect(560, 80, 240, 140, null, C.DARK_BROWN, 5);
  line(680, 80, 680, 220, C.DARK_BROWN, 3);
  line(560, 150, 800, 150, C.DARK_BROWN, 3);
}

function drawHallway() {
  gradient(0, 0, W, PLAY_AREA.y, "#c8d2dc", C.WALL_BEIGE);
  rect(0, PLAY_AREA.y, W, H - PLAY_AREA.y, C.LIGHT_GRAY);
  for (let i = 0; i < W; i += 60) {
    for (let j = PLAY_AREA.y; j < H; j += 60) rect(i, j, 60, 60, null, C.GRAY, 1);
  }
  for (let i = 80; i < W - 80; i += 90) {
    rect(i, 180, 70, 200, "#826e5a");
    rect(i, 180, 70, 200, null, C.DARK_BROWN, 3);
    circle(i + 55, 280, 4, C.YELLOW);
    line(i + 35, 180, i + 35, 380, C.DARK_BROWN, 2);
  }
  for (let i = 150; i < W; i += 250) {
    rect(i, 30, 100, 14, "#ffffc8");
    rect(i, 30, 100, 14, null, C.DARK_GRAY, 2);
  }
  rect(40, 80, 130, 60, C.GREEN);
  rect(40, 80, 130, 60, null, C.BLACK, 3);
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  drawText("→ 매점", 60, 100, 16, C.WHITE);
}

function drawStairsUp() {
  gradient(0, 0, W, H, "#c8c3b4", C.WALL_BEIGE);
  rect(0, 0, 200, H, "#b4aa96");
  rect(W - 200, 0, 200, H, "#b4aa96");
  line(200, 0, 200, H, C.DARK_BROWN, 3);
  line(W - 200, 0, W - 200, H, C.DARK_BROWN, 3);
  const a = STAIRS_AREA;
  for (let i = 0; i < 14; i++) {
    const t = i / 14;
    const sy = a.bottom - Math.floor((i + 1) * a.h / 14);
    const sh = Math.floor(a.h / 14) + 2;
    const m = Math.floor(t * 60);
    const shade = 200 - i * 8;
    ctx.fillStyle = `rgb(${shade},${shade-10},${shade-30})`;
    ctx.fillRect(a.x + m, sy, a.w - 2*m, sh);
    line(a.x + m, sy, a.right - m, sy, C.DARK_GRAY, 2);
  }
  line(a.x, a.bottom, a.x + 60, a.y, C.DARK_BROWN, 6);
  line(a.right, a.bottom, a.right - 60, a.y, C.DARK_BROWN, 6);
  ctx.fillStyle = C.ORANGE;
  ctx.beginPath();
  ctx.moveTo(W/2, 30); ctx.lineTo(W/2 - 25, 65); ctx.lineTo(W/2 + 25, 65);
  ctx.closePath(); ctx.fill();
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  drawText("↑ 위층 (매점)", W/2, 75, 16, C.BLACK, true);
}

function drawShop() {
  gradient(0, 0, W, PLAY_AREA.y, "#ffebc8", "#fad7aa");
  rect(0, PLAY_AREA.y, W, H - PLAY_AREA.y, "#f5dcb4");
  for (let i = 0; i < W; i += 50) line(i, PLAY_AREA.y, i, H, "#dcc3a0", 1);
  rect(250, 50, 400, 80, C.RED);
  rect(250, 50, 400, 80, null, C.DARK_RED, 5);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  drawText("학교 매점", W/2, 90, 36, C.WHITE, true);
  // 안내문구
  ctx.textAlign = "center"; ctx.textBaseline = "top";
  drawText("상자 중 하나에만 빵! 잘 골라보세요", W/2, 145, 18, "#666");
}

function drawStairsDown() {
  gradient(0, 0, W, H, C.WALL_BEIGE, "#c8c3b4");
  rect(0, 0, 200, H, "#b4aa96");
  rect(W - 200, 0, 200, H, "#b4aa96");
  line(200, 0, 200, H, C.DARK_BROWN, 3);
  line(W - 200, 0, W - 200, H, C.DARK_BROWN, 3);
  const a = STAIRS_AREA;
  for (let i = 0; i < 14; i++) {
    const t = i / 14;
    const sy = a.y + Math.floor(t * a.h);
    const sh = Math.floor(a.h / 14) + 2;
    const m = Math.floor((1 - t) * 60);
    const shade = 180 + i * 5;
    ctx.fillStyle = `rgb(${shade},${shade-10},${shade-30})`;
    ctx.fillRect(a.x + m, sy, a.w - 2*m, sh);
    line(a.x + m, sy, a.right - m, sy, C.DARK_GRAY, 2);
  }
  line(a.x + 60, a.y, a.x, a.bottom, C.DARK_BROWN, 6);
  line(a.right - 60, a.y, a.right, a.bottom, C.DARK_BROWN, 6);
  const arrowY = H - 70;
  ctx.fillStyle = C.ORANGE;
  ctx.beginPath();
  ctx.moveTo(W/2, arrowY + 35);
  ctx.lineTo(W/2 - 25, arrowY);
  ctx.lineTo(W/2 + 25, arrowY);
  ctx.closePath(); ctx.fill();
  ctx.textAlign = "center"; ctx.textBaseline = "bottom";
  drawText("↓ 아래층 (교실)", W/2, arrowY - 5, 16, C.BLACK, true);
}

// ============ 매점 상자 ============
const BOX_POS = [[280, 250], [430, 250], [580, 250]];
const BOX_W = 90, BOX_H = 110;

function getNearestBox(player) {
  let nearest = -1, minDist = 80;
  for (let i = 0; i < BOX_POS.length; i++) {
    const [bx, by] = BOX_POS[i];
    const cx = bx + BOX_W/2, cy = by + BOX_H + 30;
    const d = Math.hypot(player.x - cx, player.y - cy);
    if (d < minDist) { minDist = d; nearest = i; }
  }
  return nearest;
}

function drawBoxes(state) {
  const boxes = state.shopBoxes || [];
  const nearest = state.gameOver ? -1 : getNearestBox(state.player);
  for (let i = 0; i < BOX_POS.length; i++) {
    const [bx, by] = BOX_POS[i];
    const box = boxes[i] || { opened: false, hasBread: false };
    if (!box.opened) {
      // 닫힌 상자
      const color = (i === nearest) ? "#f5963c" : C.BROWN;
      rect(bx, by, BOX_W, BOX_H, color);
      rect(bx, by, BOX_W, BOX_H, null, C.DARK_BROWN, 3);
      line(bx, by + 30, bx + BOX_W, by + 30, C.DARK_BROWN, 2);
      line(bx + BOX_W/2, by, bx + BOX_W/2, by + 30, C.DARK_BROWN, 2);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      drawText("?", bx + BOX_W/2, by + 70, 32, C.DARK_BROWN, true);
      drawText(`${i+1}번`, bx + BOX_W/2, by + BOX_H - 15, 14, "#999");
    } else if (box.hasBread) {
      // 빵 있는 상자 (성공)
      rect(bx, by, BOX_W, BOX_H, C.GREEN);
      rect(bx, by, BOX_W, BOX_H, null, "#2d7d40", 3);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      drawText("✓", bx + BOX_W/2, by + BOX_H/2, 48, C.WHITE, true);
    } else {
      // 빈 상자 (꽝)
      rect(bx, by, BOX_W, BOX_H, "#7a7a7a");
      rect(bx, by, BOX_W, BOX_H, null, "#444", 3);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.strokeStyle = "#ff6666"; ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(bx + 20, by + 25); ctx.lineTo(bx + BOX_W - 20, by + BOX_H - 35); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + BOX_W - 20, by + 25); ctx.lineTo(bx + 20, by + BOX_H - 35); ctx.stroke();
      drawText("꽝", bx + BOX_W/2, by + BOX_H - 15, 14, "#ccc");
    }
  }
  // 가장 가까운 상자가 있으면 안내
  if (nearest >= 0 && !state.player.hasBread && !boxes[nearest].opened) {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    roundRect(W/2 - 180, 175, 360, 30, 8, "rgba(245,150,60,0.9)");
    drawText(`🎁 스페이스바 / 빵사기 버튼으로 ${nearest+1}번 열기`,
             W/2, 190, 16, C.WHITE, true);
  }
}

// ============ 스테이지 정의 ============
const STAGES = [
  { name: "1. 교실 (출발)",   draw: drawClassroom,  exit: "right", teachers: 0, tspeed: 0, chase: 0 },
  { name: "2. 복도",          draw: drawHallway,    exit: "right", teachers: 2, tspeed: 4, chase: 0 },
  { name: "3. 계단 (위로)",   draw: drawStairsUp,   exit: "up",    teachers: 2, tspeed: 3, chase: 0 },
  { name: "4. 매점",          draw: drawShop,       exit: "right", teachers: 0, tspeed: 0, chase: 0 },
  { name: "5. 계단 (아래로)", draw: drawStairsDown, exit: "down",  teachers: 2, tspeed: 3, chase: 1 },
  { name: "6. 복도",          draw: drawHallway,    exit: "right", teachers: 3, tspeed: 4, chase: 1 },
  { name: "7. 교실 (도착)",   draw: drawClassroom,  exit: "right", teachers: 0, tspeed: 0, chase: 0 },
];

// ============ 캐릭터 ============
class Player {
  constructor() {
    this.size = 36; this.area = PLAY_AREA;
    this.x = this.area.x + 50; this.y = this.area.cy;
    this.speed = 4; this.hasBread = false;
    this.facing = 1; this.walkT = 0;
  }
  setArea(a) { this.area = a; }
  resetToLeft()   { this.x = this.area.x + 50;     this.y = this.area.cy; }
  resetToBottom() { this.x = this.area.cx;         this.y = this.area.bottom - 30; }
  resetToTop()    { this.x = this.area.cx;         this.y = this.area.y + 30; }
  move(dx, dy) {
    if (dx > 0) this.facing = 1;
    else if (dx < 0) this.facing = -1;
    let nx = this.x + dx * this.speed;
    let ny = this.y + dy * this.speed;
    const h = this.size / 2;
    nx = Math.max(this.area.x + h, Math.min(this.area.right - h, nx));
    ny = Math.max(this.area.y + h, Math.min(this.area.bottom - h, ny));
    if (nx !== this.x || ny !== this.y) this.walkT += 0.25;
    this.x = nx; this.y = ny;
  }
  rect() {
    return { x: this.x - this.size/2, y: this.y - this.size/2, w: this.size, h: this.size };
  }
  draw() {
    shadow(this.x - 22, this.y + 18, 44, 12);
    const lo = Math.floor(Math.sin(this.walkT) * 4);
    rect(this.x - 10, this.y + 10, 8, 18 + lo, C.DARK_BLUE);
    rect(this.x + 2,  this.y + 10, 8, 18 - lo, C.DARK_BLUE);
    rect(this.x - 14, this.y - 8, 28, 24, C.BLUE);
    rect(this.x - 14, this.y - 8, 28, 24, null, C.DARK_BLUE, 2);
    ctx.fillStyle = C.RED;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 8); ctx.lineTo(this.x - 4, this.y - 2);
    ctx.lineTo(this.x, this.y + 8); ctx.lineTo(this.x + 4, this.y - 2);
    ctx.closePath(); ctx.fill();
    circle(this.x, this.y - 18, 13, C.SKIN, C.BLACK, 2);
    ctx.strokeStyle = C.BLACK; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y - 21, 11, Math.PI, 0, false);
    ctx.stroke();
    const ex = 2 * this.facing;
    circle(this.x - 4 + ex, this.y - 19, 2, C.BLACK);
    circle(this.x + 4 + ex, this.y - 19, 2, C.BLACK);
    if (this.hasBread) {
      const bx = this.x + 16 * this.facing, by = this.y + 2;
      ellipse(bx - 14, by - 7, 28, 16, C.BROWN);
      ellipse(bx - 14, by - 7, 28, 16, null, C.DARK_BROWN, 2);
    }
  }
}

class Teacher {
  constructor(opts) {
    this.size = 44;
    this.area = opts.area || PLAY_AREA;
    this.x = opts.startX !== undefined ? opts.startX : (this.area.x + 100);
    this.y = opts.startY !== undefined ? opts.startY : this.area.cy;
    this.speed = opts.speed || 2;
    this.direction = Math.random() < 0.5 ? -1 : 1;
    this.vyDirection = Math.random() < 0.5 ? -1 : 1;
    this.vyTimer = 1 + Math.random() * 2;
    this.walkT = 0;
    this.chase = !!opts.chase;
  }
  update(player, dt) {
    this.walkT += 0.2;
    if (this.chase && player) {
      const dx = player.x - this.x, dy = player.y - this.y;
      const dist = Math.max(Math.hypot(dx, dy), 1);
      const sp = this.speed * 0.7;
      this.x += sp * dx / dist;
      this.y += sp * dy / dist;
      this.direction = dx > 0 ? 1 : -1;
    } else {
      this.x += this.speed * this.direction;
      this.vyTimer -= dt;
      if (this.vyTimer <= 0) {
        this.vyDirection *= -1;
        this.vyTimer = 1 + Math.random() * 1.5;
      }
      this.y += this.speed * 0.4 * this.vyDirection;
    }
    const h = this.size / 2;
    if (this.x < this.area.x + h)      { this.x = this.area.x + h;      this.direction = 1; }
    if (this.x > this.area.right - h)  { this.x = this.area.right - h;  this.direction = -1; }
    if (this.y < this.area.y + h)      { this.y = this.area.y + h;      this.vyDirection = 1; }
    if (this.y > this.area.bottom - h) { this.y = this.area.bottom - h; this.vyDirection = -1; }
  }
  rect() {
    return { x: this.x - this.size/2, y: this.y - this.size/2, w: this.size, h: this.size };
  }
  draw() {
    shadow(this.x - 26, this.y + 22, 52, 14);
    const lo = Math.floor(Math.sin(this.walkT) * 4);
    rect(this.x - 12, this.y + 14, 10, 20 + lo, C.BLACK);
    rect(this.x + 2,  this.y + 14, 10, 20 - lo, C.BLACK);
    rect(this.x - 18, this.y - 10, 36, 30, C.DARK_GRAY);
    rect(this.x - 18, this.y - 10, 36, 30, null, C.BLACK, 2);
    ctx.fillStyle = C.WHITE;
    ctx.beginPath();
    ctx.moveTo(this.x - 6, this.y - 10);
    ctx.lineTo(this.x + 6, this.y - 10);
    ctx.lineTo(this.x, this.y + 4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = C.DARK_RED;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 10);
    ctx.lineTo(this.x - 3, this.y - 4);
    ctx.lineTo(this.x, this.y + 4);
    ctx.lineTo(this.x + 3, this.y - 4);
    ctx.closePath(); ctx.fill();
    circle(this.x, this.y - 22, 15, C.SKIN, C.BLACK, 2);
    ctx.strokeStyle = C.BLACK; ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(this.x, this.y - 26, 13, Math.PI, 0, false);
    ctx.stroke();
    line(this.x - 9, this.y - 28, this.x - 3, this.y - 25, C.BLACK, 3);
    line(this.x + 3, this.y - 25, this.x + 9, this.y - 28, C.BLACK, 3);
    circle(this.x - 5, this.y - 22, 2, C.BLACK);
    circle(this.x + 5, this.y - 22, 2, C.BLACK);
    const labelText = this.chase ? "학생부장!" : "선생님";
    const labelBg = this.chase ? "#640000" : C.DARK_RED;
    ctx.font = "bold 14px -apple-system, 'Malgun Gothic', sans-serif";
    const tw = ctx.measureText(labelText).width;
    roundRect(this.x - tw/2 - 6, this.y - 56, tw + 12, 22, 5, labelBg);
    ctx.fillStyle = C.WHITE;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(labelText, this.x, this.y - 45);
  }
}

// ============ 엔딩 장면 ============
function drawEndingScene(timer) {

  rect(0, PLAY_AREA.y, W, H - PLAY_AREA.y, C.WOOD);

  rect(200, 280, 200, 80, C.DARK_BROWN);
  rect(210, 290, 180, 60, C.BROWN);
  rect(560, 80, 240, 140, "#c8e6ff");

  // 책상들

  rect(sx - 16, sy + 10, 32, 30, null, C.DARK_BLUE, 2);
  ctx.fillStyle = C.RED;
  ctx.beginPath();
  ctx.moveTo(sx, sy + 10);
  ctx.lineTo(sx - 4, sy + 16);
  ctx.lineTo(sx, sy + 28);
  ctx.lineTo(sx + 4, sy + 16);
  ctx.closePath(); ctx.fill();
  rect(sx + 6, sy + 18, 12, 20, C.SKIN);
  rect(sx + 6, sy + 18, 12, 20, null, C.BLACK, 1);
  circle(sx, sy - 5, 15, C.SKIN, C.BLACK, 2);

  ctx.beginPath();

  const chew = (Math.sin(timer * 6) + 1) / 2;

  ctx.beginPath(); ctx.arc(sx - 6, sy - 5, 3, Math.PI, 2 * Math.PI); ctx.stroke();

// ============ 충돌 / 게임 상태 ============
function rectsCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function makeTeachers(stageIdx) {
  const s = STAGES[stageIdx];
  const area = getPlayArea(stageIdx);
  const teachers = [];
  for (let i = 0; i < s.teachers; i++) {
    let sx, sy;
    if (area.w > area.h) {
      sx = area.x + 150 + i * (area.w - 300) / Math.max(s.teachers, 1);
      sy = area.cy + (i - s.teachers/2) * 30;
    } else {
      sx = area.cx + (i - s.teachers/2) * 60;
      sy = area.y + 100 + i * (area.h - 200) / Math.max(s.teachers, 1);
    }
    teachers.push(new Teacher({
      speed: s.tspeed, startX: sx, startY: sy,
      area: area, chase: i < s.chase
    }));
  }
  return teachers;
}

function makeShopBoxes() {
  const breadIdx = Math.floor(Math.random() * 3);
  return [0, 1, 2].map(i => ({ opened: false, hasBread: i === breadIdx }));
}

// ============ 점수 시스템 ============
const START_TIME = 50.0;
const SCORE_KEY = "breadGameScores";

function loadScores() {
  try {
    const raw = localStorage.getItem(SCORE_KEY);
    if (!raw) return [];
    const data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch (e) { return []; }
}

function saveScore(clearTime) {
  const scores = loadScores();
  const now = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  const date = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  scores.push({ time: Math.round(clearTime * 100) / 100, date });
  scores.sort((a, b) => a.time - b.time);
  const top10 = scores.slice(0, 10);
  try { localStorage.setItem(SCORE_KEY, JSON.stringify(top10)); } catch (e) {}
  return top10;
}

function getRank(clearTime, scores) {
  const target = Math.round(clearTime * 100) / 100;
  for (let i = 0; i < Math.min(3, scores.length); i++) {
    if (Math.abs(scores[i].time - target) < 0.01) return i + 1;
  }
  return 0;
}

function newGame() {
  const p = new Player();
  p.setArea(getPlayArea(0));
  p.resetToLeft();
  return {
    player: p, stageIdx: 0,
    teachers: makeTeachers(0),
    timeLeft: START_TIME,
    message: "오른쪽 끝까지 가자!",
    gameOver: false, win: false,
    hitCooldown: 0, transition: 0,
    clearTime: null, scores: [], newRank: 0,
    shopBoxes: [], boxCooldown: 0,
    endingPhase: 0, endingTimer: 0,
  };
}

function goNextStage(state) {
  state.stageIdx++;
  if (state.stageIdx >= STAGES.length) {
    state.stageIdx = STAGES.length - 1;  // 안전하게 마지막 인덱스 유지
    state.win = true; state.gameOver = true;
    const clearTime = START_TIME - state.timeLeft;
    state.clearTime = clearTime;
    state.scores = saveScore(clearTime);
    state.newRank = getRank(clearTime, state.scores);
    state.message = state.newRank > 0
      ? `🏆 TOP ${state.newRank} 기록!`
      : `성공! ${clearTime.toFixed(2)}초`;
    state.endingPhase = 1;
    state.endingTimer = 0;
    return;
  }
  const idx = state.stageIdx;
  const p = state.player;
  p.setArea(getPlayArea(idx));
  const ed = STAGES[idx].exit;
  if      (ed === "up")   p.resetToBottom();
  else if (ed === "down") p.resetToTop();
  else                     p.resetToLeft();
  state.teachers = makeTeachers(idx);
  state.transition = 0.5;
  if (idx === 3) state.shopBoxes = makeShopBoxes();
  state.boxCooldown = 0;
  if      (idx === 2) state.message = "위로 올라가자! 가운데 위쪽 끝으로!";
  else if (idx === 3) state.message = "매점! 상자를 골라 빵을 찾자!";
  else if (idx === 4) state.message = "아래로! 가운데 아래쪽 끝으로!";
  else if (idx === 6) state.message = "교실 도착! 오른쪽 끝까지!";
  else                state.message = STAGES[idx].name;
}

let state = newGame();

// ============ 입력 ============
const keys = {};
function setKey(key, pressed) {
  keys[key] = pressed;
  if (pressed && key === " " && !state.gameOver) {
    const p = state.player;
    if (state.stageIdx === 3 && !p.hasBread && state.boxCooldown <= 0) {
      const bi = getNearestBox(p);
      if (bi >= 0 && !state.shopBoxes[bi].opened) {
        state.shopBoxes[bi].opened = true;
        state.boxCooldown = 0.5;
        if (state.shopBoxes[bi].hasBread) {
          p.hasBread = true;
          state.message = "🎉 빵 획득! 오른쪽 끝으로!";
        } else {
          state.timeLeft -= 3;
          const remaining = state.shopBoxes.filter(b => !b.opened).length;
          state.message = remaining > 0 ? `꽝! -3초 (남은 상자 ${remaining}개)` : "이런...";
        }
      }
    }
  }
  if (pressed && (key === "r" || key === "R")) state = newGame();
}

window.addEventListener("keydown", (e) => {
  if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) e.preventDefault();
  setKey(e.key, true);
});
window.addEventListener("keyup", (e) => setKey(e.key, false));

function setupMobileControls() {
  document.querySelectorAll("#controls button").forEach(btn => {
    const key = btn.dataset.key;
    const onDown = (e) => { e.preventDefault(); btn.classList.add("pressed"); setKey(key, true); };
    const onUp = (e) => { e.preventDefault(); btn.classList.remove("pressed"); setKey(key, false); };
    btn.addEventListener("touchstart", onDown, { passive: false });
    btn.addEventListener("touchend", onUp, { passive: false });
    btn.addEventListener("touchcancel", onUp, { passive: false });
    btn.addEventListener("mousedown", onDown);
    btn.addEventListener("mouseup", onUp);
    btn.addEventListener("mouseleave", onUp);
  });
}

function isTouchDevice() {
  return ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
}

function resizeCanvas() {
  const wrap = document.getElementById("wrap");
  const wrapW = wrap.clientWidth;
  const wrapH = wrap.clientHeight;
  const ratio = W / H;
  let cw, ch;
  if (wrapW / wrapH > ratio) { ch = wrapH; cw = ch * ratio; }
  else                        { cw = wrapW; ch = cw / ratio; }
  if (isTouchDevice() && wrapW < 768) {
    ch = Math.min(ch, wrapH * 0.65);
    cw = ch * ratio;
    if (cw > wrapW) { cw = wrapW; ch = cw / ratio; }
  }
  canvas.style.width = cw + "px";
  canvas.style.height = ch + "px";
}
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 100));

// ============ 메인 루프 ============
let lastTime = performance.now();
let started = false;

function update(dt) {
  // 게임 종료 시 엔딩 페이즈만 진행
  if (state.gameOver) {
    if (state.win && state.endingPhase > 0) {
      state.endingTimer += dt;
      if (state.endingPhase === 1 && state.endingTimer >= 3.0) {
        state.endingPhase = 2;
        state.endingTimer = 0;
      }
    }
    return;
  }

  const p = state.player;
  let dx = 0, dy = 0;
  if (keys["ArrowLeft"])  dx -= 1;
  if (keys["ArrowRight"]) dx += 1;
  if (keys["ArrowUp"])    dy -= 1;
  if (keys["ArrowDown"])  dy += 1;
  if (dx || dy) p.move(dx, dy);

  const idx = state.stageIdx;
  const ed = STAGES[idx].exit;
  const a = p.area;
  let reached = false;
  if      (ed === "right") reached = p.x >= a.right - p.size/2 - 2;
  else if (ed === "up")    reached = p.y <= a.y + p.size/2 + 2;
  else if (ed === "down")  reached = p.y >= a.bottom - p.size/2 - 2;

  // 매점은 빵 있어야만 통과
  if (idx === 3) {
    if (reached && p.hasBread) goNextStage(state);
  } else if (reached) {
    goNextStage(state);
  }

  for (const t of state.teachers) t.update(p, dt);

  if (state.hitCooldown > 0) state.hitCooldown -= dt;
  else {
    for (const t of state.teachers) {
      if (rectsCollide(p.rect(), t.rect())) {
        state.timeLeft -= 5;
        state.message = "선생님께 걸렸다! -5초";
        state.hitCooldown = 1.0;
        if      (ed === "up")   p.resetToBottom();
        else if (ed === "down") p.resetToTop();
        else                     p.resetToLeft();
        break;
      }
    }
  }

  state.timeLeft -= dt;
  if (state.timeLeft <= 0) {
    state.timeLeft = 0;
    state.gameOver = true;
    state.win = false;
    state.message = "시간 초과! 실패...";
  }
  if (state.transition > 0) state.transition -= dt;
  if (state.boxCooldown > 0) state.boxCooldown -= dt;
}

function render() {
  // 1) 배경 + 캐릭터
  STAGES[state.stageIdx].draw();
  if (state.stageIdx === 3) drawBoxes(state);
  for (const t of state.teachers) t.draw();
  state.player.draw();

  // 2) 상단 UI 바
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, W, 50);
  let timeColor = C.WHITE;
  if (state.timeLeft < 5) timeColor = (Math.floor(state.timeLeft * 4) % 2 === 0) ? C.RED : C.WHITE;
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  drawText(`⏱ ${state.timeLeft.toFixed(1)}초`, 20, 25, 30, timeColor, true);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  drawText(STAGES[state.stageIdx].name, W/2, 25, 20, C.WHITE);
  ctx.textAlign = "right"; ctx.textBaseline = "middle";
  drawText(state.player.hasBread ? "빵: 있음 🥖" : "빵: 없음",
           W - 20, 25, 20, state.player.hasBread ? C.YELLOW : C.WHITE);

  // 3) 하단 메시지 바
  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.fillRect(0, H - 40, W, 40);
  let msgColor = C.WHITE;
  if (state.win) msgColor = C.GREEN;
  else if (state.gameOver) msgColor = C.RED;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  drawText(state.message, W/2, H - 20, 20, msgColor);

  // 4) 스테이지 전환 페이드
  if (state.transition > 0) {
    const alpha = state.transition / 0.5;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // 5) 게임 종료 화면
  if (state.gameOver) {
    // 5-A) 클리어 + 페이즈 1: 엔딩 장면
    if (state.win && state.endingPhase === 1) {
      drawEndingScene(state.endingTimer);
      if (state.endingTimer < 0.5) {
        const a = 1 - state.endingTimer / 0.5;
        ctx.fillStyle = `rgba(0,0,0,${a})`;
        ctx.fillRect(0, 0, W, H);
      }
    }
    // 5-B) 클리어 + 페이즈 2: 통계 화면
    else if (state.win && state.endingPhase === 2) {
      const ovA = Math.min(0.72, state.endingTimer * 2.5);
      ctx.fillStyle = `rgba(0,0,0,${ovA})`;
      ctx.fillRect(0, 0, W, H);

      if (state.endingTimer > 0.2) {
        const ca = Math.min(1, (state.endingTimer - 0.2) * 2);
        ctx.globalAlpha = ca;

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        drawText("Game Clear!", W/2, 80, 56, C.GREEN, true);
        drawText("매점 빵 사오기 미션 완료!", W/2, 140, 22, C.WHITE);

        if (state.clearTime !== null) {
          drawText(`클리어 타임: ${state.clearTime.toFixed(2)}초`,
                   W/2, 190, 36, C.YELLOW, true);

          if (state.newRank > 0) {
            const medals = ["🥇", "🥈", "🥉"];
            drawText(`${medals[state.newRank-1]} 새 TOP ${state.newRank} 기록!`,
                     W/2, 235, 32, C.ORANGE, true);
          }

          const boxX = W/2 - 200, boxY = 285, boxW = 400, boxH = 210;
          roundRect(boxX, boxY, boxW, boxH, 10, "rgba(40,40,50,0.95)", C.YELLOW, 3);

          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          drawText("🏆 TOP 3 기록", W/2, boxY + 25, 22, C.YELLOW, true);

          const medalsLabel = ["1위 🥇", "2위 🥈", "3위 🥉"];
          const top3 = state.scores.slice(0, 3);
          for (let i = 0; i < 3; i++) {
            const rowY = boxY + 70 + i * 45;
            if (i < top3.length) {
              const s = top3[i];
              const isNew = (state.newRank === i + 1);
              const color = isNew ? C.ORANGE : C.WHITE;
              ctx.textAlign = "left";
              drawText(medalsLabel[i], boxX + 20, rowY, 22, color);
              drawText(`${s.time.toFixed(2)}초`, boxX + 130, rowY, 22, color);
              drawText(s.date, boxX + 240, rowY, 16, isNew ? C.ORANGE : "#aaaaaa");
            } else {
              ctx.textAlign = "left";
              drawText(`${medalsLabel[i]}  - - -`, boxX + 20, rowY, 22, "#888888");
            }
          }
        }
        ctx.globalAlpha = 1;

        if (state.endingTimer > 0.8) {
          const ra = Math.min(1, (state.endingTimer - 0.8) * 2);
          ctx.globalAlpha = ra;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          drawText(isTouchDevice() ? "재시작 버튼을 누르세요" : "R 키를 누르면 다시 시작",
                   W/2, 525, 20, C.WHITE);
          ctx.globalAlpha = 1;
        }
      }
    }
    // 5-C) 실패
    else {
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      drawText("게임 오버", W/2, H/2 - 40, 56, C.RED, true);
      drawText(isTouchDevice() ? "재시작 버튼을 누르세요" : "R 키를 누르면 다시 시작",
               W/2, H/2 + 30, 20, C.WHITE);
    }
  }
}

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  if (started) { update(dt); render(); }
  requestAnimationFrame(loop);
}

// ============ 시작 ============
document.getElementById("start-btn").addEventListener("click", () => {
  document.getElementById("start-hint").style.display = "none";
  if (isTouchDevice()) document.getElementById("controls").classList.add("show");
  resizeCanvas();
  started = true;
  lastTime = performance.now();
});

setupMobileControls();
resizeCanvas();
render();
requestAnimationFrame(loop);
</script>
</body>
</html>
